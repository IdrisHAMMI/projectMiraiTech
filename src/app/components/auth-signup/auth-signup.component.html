
<div class="flex items-center justify-center h-screen rounded-[5px]">
  <section class="signup-form">
    <div class="text-center">
      <a href="#" class="flex justify-center">
        <img src="../../../assets/img/index_logo.png" class="w-[150px]">
      </a>
    </div>

    <div class="container flex justify-center border-t-4 mt-5 max-w-xl">
      <div class="w-full">
        <div class="text-center">
          <h1 class="text-3xl font-bold pt-2">Créer un Nouveau Compte</h1>
        </div>
        <div class="mt-4">
          <form [formGroup]="form" (submit)="submit()" class="w-96 mx-auto">
            <input type="hidden" name="_id" >
            <div class="mb-4">
              <label for="username" class="block font-bold">Username</label>
              <input type="text" formControlName="username" class="form-input w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500" name="username" placeholder="Username" />
            </div>
            <div class="mb-4">
              <label for="email" class="block font-bold">Email</label>
              <input type="text" formControlName="email" class="form-input w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500" name="email" placeholder="Email" />
            </div>
            <div class="mb-4">
              <label for="password" class="block font-bold">Password</label>
              <input type="password" formControlName="password"  class="form-input w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500" name="password" placeholder="Password" />
            </div>
            <div class="mt-4">
              <button type="submit" name="submit" class="btn w-full py-2 px-4 bg-blue-500 text-white rounded hover:bg-blue-600 focus:outline-none focus:bg-blue-600">Register</button>
              <p><br><a href="/index" class="text-blue-500">Retourner dans l'Index...</a></p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>
</div>
